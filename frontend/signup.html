<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GramRide | Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-fixed bg-center bg-no-repeat bg-cover min-h-screen flex items-center justify-center" style="background-image: url('assets/village1.png');">

  <div class="bg-white bg-opacity-90 p-8 rounded-xl shadow-lg max-w-md w-full">
    <h2 class="text-2xl font-bold text-center text-green-700 mb-6">GramRide Sign Up</h2>
    <form id="signupForm" class="space-y-4">
      <input type="text" id="fullname" placeholder="Full Name" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" />
      
      <input type="tel" id="phone" placeholder="Phone Number" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" />

      <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" />
      
      <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" />
      
      <select id="role" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
        <option value="">Select Role</option>
        <option value="user">User</option>
       
      </select>

      <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-md">
        Sign Up
      </button>

      <p class="text-center text-sm mt-4">
        Already have an account?
        <a href="login.html" class="text-blue-600 hover:underline">Login here</a>
      </p>
    </form>
  </div>

  <script src="js/signup.js"></script>
</body>
</html>
