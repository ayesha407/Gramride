<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Manage Drivers</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <h1 class="text-2xl font-bold text-green-700 mb-4">🚖 Driver Management Panel</h1>

  <table class="w-full bg-white shadow-md rounded">
    <thead>
      <tr class="bg-green-200 text-left">
        <th class="p-2">Driver ID</th>
        <th class="p-2">Name</th>
        <th class="p-2">Email</th>
        <th class="p-2">Status</th>
        <th class="p-2">Action</th>
      </tr>
    </thead>
    <tbody id="driverTableBody"></tbody>
  </table>

  <script>
    fetch("http://localhost:8080/api/users/drivers")
      .then(res => res.json())
      .then(drivers => {
        const tbody = document.getElementById("driverTableBody");
        drivers.forEach(driver => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="p-2">${driver.id}</td>
            <td class="p-2">${driver.fullName}</td>
            <td class="p-2">${driver.email}</td>
            <td class="p-2">${driver.status}</td>
            <td class="p-2">
              <button onclick="updateStatus(${driver.id}, '${driver.status === 'ACTIVE' ? 'SUSPENDED' : 'ACTIVE'}')" 
                class="px-3 py-1 rounded ${driver.status === 'ACTIVE' ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}">
                ${driver.status === 'ACTIVE' ? 'Suspend' : 'Activate'}
              </button>
            </td>
          `;
          tbody.appendChild(row);
        });
      });

    function updateStatus(id, newStatus) {
      fetch(`http://localhost:8080/api/users/${id}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus })
      })
      .then(() => location.reload());
    }
  </script>
</body>
</html>
