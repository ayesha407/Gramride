<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GramRide | Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 flex items-center justify-center min-h-screen">
  <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold text-green-700 mb-4">📝 Ride Feedback</h2>

    <form id="feedbackForm">
      <label class="block mb-2 font-medium">Comments</label>
      <textarea id="comments" rows="3" class="w-full p-2 border rounded mb-4" placeholder="Enter your feedback..."></textarea>

      <label class="block mb-2 font-medium">Feedback Type</label>
      <select id="feedbackType" class="w-full p-2 border rounded mb-4">
        <option value="RASH_DRIVE">Rash Driving</option>
        <option value="VERY_RASH_DRIVE">Very Rash Driving</option>
        <option value="POLITE_DRIVING">Polite Driving</option>
        <option value="ON_TIME">On Time</option>
      </select>

      <label class="block mb-2 font-medium">Rating</label>
      <div id="starRating" class="flex mb-4 space-x-1 text-2xl cursor-pointer">
        <span data-value="1">☆</span>
        <span data-value="2">☆</span>
        <span data-value="3">☆</span>
        <span data-value="4">☆</span>
        <span data-value="5">☆</span>
      </div>

      <button type="submit" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
        Submit Feedback
      </button>
    </form>
  </div>

  <script>
    const ride = JSON.parse(localStorage.getItem("latestRide"));
    if (!ride) {
      alert("No recent ride found.");
      window.location.href = "user_dashboard.html";
    }

    document.getElementById("feedbackForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const payload = {
        rideId: ride.id,
        comments: document.getElementById("comments").value,
        feedbackType: document.getElementById("feedbackType").value
      };

      fetch("http://localhost:8080/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (!res.ok) throw new Error();
        return res.text();
      })
      .then(() => {
        alert("Thank you for your feedback!");
        localStorage.removeItem("latestRide");
        window.location.href = "user_dashboard.html";
      })
      .catch(() => {
        alert("❌ Failed to submit feedback.");
      });
    });

    let selectedRating = 0;

    document.querySelectorAll("#starRating span").forEach(star => {
      star.addEventListener("mouseover", () => {
        const val = parseInt(star.dataset.value);
        highlightStars(val);
      });

      star.addEventListener("click", () => {
        selectedRating = parseInt(star.dataset.value);
        highlightStars(selectedRating);
      });

      star.addEventListener("mouseout", () => {
        highlightStars(selectedRating);
      });
    });

    function highlightStars(rating) {
      document.querySelectorAll("#starRating span").forEach(star => {
        star.textContent = parseInt(star.dataset.value) <= rating ? "★" : "☆";
      });
    }
  </script>
</body>
</html>
