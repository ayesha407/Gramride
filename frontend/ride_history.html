<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ride History | GramRide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen">

  <div class="p-4 max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-green-700">📜 Your Ride History</h1>
      <div class="flex gap-2">
        <button onclick="goToDashboard()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Go to Dashboard</button>
        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Logout</button>
      </div>
    </div>

    <div id="rideHistoryError" class="hidden text-red-600 mb-4 font-semibold"></div>

    <table class="w-full border-collapse bg-white shadow rounded-lg text-sm">
      <thead>
        <tr class="bg-green-600 text-white">
          <th class="p-2 border">ID</th>
          <th class="p-2 border">Pickup</th>
          <th class="p-2 border">Drop</th>
          <th class="p-2 border">Fare</th>
          <th class="p-2 border">Vehicle</th>
          <th class="p-2 border">Category</th> <!-- ✅ New Column -->
          <th class="p-2 border">Status</th>
        </tr>
      </thead>
      <tbody id="rideHistoryTableBody">
        <!-- Rides will be populated here -->
      </tbody>
    </table>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("gramrideCurrentUser"));
    if (!user) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.removeItem("gramrideCurrentUser");
      window.location.href = "login.html";
    }

    function goToDashboard() {
      window.location.href = "user_dashboard.html";
    }

    function loadRideHistory() {
      fetch(`http://localhost:8080/api/rides/user/${user.id}`)
        .then(res => res.json())
        .then(rides => {
          const tbody = document.getElementById("rideHistoryTableBody");
          tbody.innerHTML = "";

          rides.forEach(ride => {
            const row = document.createElement("tr");
            let statusCell = ride.status;

            if (ride.status === "BOOKED" || ride.status === "CONFIRMED") {
              statusCell = `<button class="bg-orange-500 text-white px-2 py-1 rounded" onclick="markAsCompleted(${ride.id})">Mark as Completed</button>`;
            }

            row.innerHTML = `
              <td class="p-2 border">${ride.id}</td>
              <td class="p-2 border">${ride.pickupLocation}</td>
              <td class="p-2 border">${ride.dropLocation}</td>
              <td class="p-2 border">₹${ride.fare}</td>
              <td class="p-2 border">${ride.vehicleType}</td>
              <td class="p-2 border">${ride.rideCategory || 'N/A'}</td> <!-- ✅ Ride Category -->
              <td class="p-2 border" id="status-${ride.id}">${statusCell}</td>
            `;
            tbody.appendChild(row);
          });
        })
        .catch(() => {
          document.getElementById("rideHistoryError").textContent = "❌ Failed to load ride history.";
          document.getElementById("rideHistoryError").classList.remove("hidden");
        });
    }

    function markAsCompleted(rideId) {
      fetch(`http://localhost:8080/api/rides/${rideId}/complete`, {
        method: "PUT"
      })
      .then(res => {
        if (!res.ok) throw new Error("Failed to mark ride as completed");
        alert("✅ Ride marked as completed!");
        loadRideHistory();
      })
      .catch(err => {
        alert("❌ Error: " + err.message);
      });
    }

    document.addEventListener("DOMContentLoaded", loadRideHistory);
  </script>

</body>
</html>
