<!-- admin_rides.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Ride Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <h1 class="text-2xl font-bold text-green-700 mb-4">🚜 GramRide - Ride Management</h1>
  
  <table class="w-full bg-white shadow-md rounded">
    <thead>
      <tr class="bg-green-200 text-left">
        <th class="p-2">Ride ID</th>
        <th class="p-2">User</th>
        <th class="p-2">Driver</th>
        <th class="p-2">From → To</th>
        <th class="p-2">Vehicle</th>
        <th class="p-2">Fare</th>
        <th class="p-2">Status</th>
        <th class="p-2">Action</th>
      </tr>
    </thead>
    <tbody id="rideTableBody"></tbody>
  </table>

  <script>
    fetch("http://localhost:8080/api/rides")
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("rideTableBody");
        data.forEach(ride => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="p-2">${ride.id}</td>
            <td class="p-2">${ride.user?.fullName || '-'}</td>
            <td class="p-2">${ride.driver?.fullName || '-'}</td>
            <td class="p-2">${ride.pickupLocation} → ${ride.dropLocation}</td>
            <td class="p-2">${ride.vehicleType}</td>
            <td class="p-2">₹${ride.fare}</td>
            <td class="p-2">${ride.status}</td>
            <td class="p-2">
              <select onchange="updateStatus(${ride.id}, this.value)" class="px-2 py-1 border rounded">
                <option selected disabled>Update</option>
                <option value="COMPLETED">✅ Complete</option>
                <option value="CANCELLED">❌ Cancel</option>
              </select>
            </td>
          `;
          tbody.appendChild(row);
        });
      });

    function updateStatus(rideId, status) {
      fetch(`http://localhost:8080/api/rides/${rideId}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
      })
      .then(() => alert("Status updated"))
      .then(() => location.reload());
    }
  </script>
</body>
</html>
