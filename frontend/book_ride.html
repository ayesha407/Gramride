<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GramRide | Book Ride</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #map { height: 300px; width: 100%; }
  </style>
</head>
<body class="relative bg-cover bg-center min-h-screen" style="background-image: url('assets/bike.jpg');">

  <div class="absolute inset-0 bg-black bg-opacity-40 z-0"></div>

  <!-- Navbar -->
  <nav class="relative z-10 bg-white bg-opacity-90 shadow-md px-6 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-green-700">🚜 GramRide</h1>
    <ul class="flex gap-4 font-medium text-gray-700">
      <li><a href="user_dashboard.html" class="hover:text-green-700">Home</a></li>
      <li><a href="ride_history.html" class="hover:text-green-700">My Rides</a></li>
      <li><a href="help.html" class="hover:text-green-700">Help</a></li>
      <li><button onclick="logout()" class="text-red-600 hover:underline">Logout</button></li>
    </ul>
  </nav>

  <!-- Booking Form -->
  <main class="relative z-10 p-6">
  <div class="bg-white/70 p-6 rounded-lg shadow-lg backdrop-blur-sm">

      <h2 class="text-2xl font-bold text-green-700 mb-6">Book Your Ride</h2>

      <!-- Pickup Location -->
<div class="mb-4 text-left">
  <label class="block font-medium mb-1">Pickup Location</label>
  <div class="flex">
    <input id="pickup" type="text" placeholder="Speak or type pickup location"
      class="w-full px-4 py-2 border rounded-l-md" />
    <button onclick="startVoice('pickup')" class="bg-green-600 text-white px-4 py-2 rounded-r-md">🎤</button>
  </div>
</div>

<!-- Drop Location -->
<div class="mb-4 text-left">
  <label class="block font-medium mb-1">Drop Location</label>
  <div class="flex">
    <input id="drop" type="text" placeholder="Speak or type drop location"
      class="w-full px-4 py-2 border rounded-l-md" />
    <button onclick="startVoice('drop')" class="bg-green-600 text-white px-4 py-2 rounded-r-md">🎤</button>
  </div>
</div>

     <!-- Ride Category -->
<div class="mb-4 text-left">
  <label for="rideCategory" class="block font-medium mb-1">Select Ride Category</label>
  <select id="rideCategory" class="w-full border px-4 py-2 rounded mt-2">
    <option value="">-- Select Category --</option>
    <option value="Function">💒 Function</option>
    <option value="Goods">📦 Goods Transport</option>
    <option value="Commute">🚌 Daily Commute</option>
    <option value="FarmUse">🚜 Farm Use</option>
  </select>
</div>


      <!-- Vehicle Selection -->
      <h3 class="font-semibold text-green-600 mb-2 mt-6">Choose Vehicle</h3>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-4">
        <div class="vehicle-option p-3 bg-green-100 rounded-lg cursor-pointer hover:bg-green-200" data-vehicle="Bike">🚲 Bike</div>
        <div class="vehicle-option p-3 bg-green-100 rounded-lg cursor-pointer hover:bg-green-200" data-vehicle="Car">🚗 Car</div>
        <div class="vehicle-option p-3 bg-green-100 rounded-lg cursor-pointer hover:bg-green-200" data-vehicle="Auto">🛺 Auto</div>
        <div class="vehicle-option p-3 bg-green-100 rounded-lg cursor-pointer hover:bg-green-200" data-vehicle="Tractor">🚜 Tractor</div>
      </div>

      <!-- Fare Display -->
      <div class="mb-6 text-lg text-green-700 font-semibold">
        Estimated Fare: ₹<span id="fare">0</span>
      </div>

      <button onclick="bookRide()" class="bg-green-700 text-white px-6 py-3 rounded hover:bg-green-800">🚀 Book Ride</button>
    </div>
  </main>

  <script src="js/book_ride.js"></script>
 

</body>
</html>
